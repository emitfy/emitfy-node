# Trusted Publisher no npm: org=emitfy, repo=emitfy-node, workflow=publish.yml
# Requer npm CLI >= 11.5.1. Não usar NODE_AUTH_TOKEN / registry-url (anula OIDC).
name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Upgrade npm (OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish @emitfy/sdk
        run: npm publish --access public --provenance
